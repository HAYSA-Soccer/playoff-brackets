name: Build HOLA Brackets

on:
  push:
    paths:
      - 'data/*.xlsx'
      - 'scripts/build_brackets.py'
      - '.github/workflows/build-brackets.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl


      - name: Debug QTR sheet
        run: |
          python - << 'EOF'
          import pandas as pd
          df = pd.read_excel("data/2026_Playoff_Schedule_Final.xlsx", sheet_name="QTR Finals")
          print(df.to_string())
          EOF


      - name: Build HOLA brackets
        run: |
          python scripts/build_brackets.py

      - name: Commit and push generated files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update HOLA brackets"
          file_pattern: docs/*
